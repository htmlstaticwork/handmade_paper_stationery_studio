<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Foliage Studio</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;500;600&family=Courier+Prime&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/script.js" defer></script>
</head>

<body class="auth-page">
    <div class="auth-card">
        <!-- Toggles at top right of card (or left in RTL) -->
        <div class="auth-toggles">
            <button class="header-icon rtl-toggle" aria-label="Toggle RTL">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12h16" />
                    <path d="M4 12l4 4" />
                    <path d="M4 12l4-4" />
                    <path d="m20 18-4 4-4-4" />
                </svg>
            </button>
            <button class="header-icon theme-toggle" aria-label="Toggle Dark Mode">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                </svg>
            </button>
        </div>

        <a href="index.html" class="auth-logo brand-logo" style="margin-bottom:1.5rem;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L19 9C22 12 21 16 19 19C17 22 13 22 12 22C11 22 7 22 5 19C3 16 2 12 5 9L12 2Z" />
                <path d="M12 22V14" />
                <circle cx="12" cy="14" r="1" class="brand-dot" />
            </svg>
            Foliage Studio
        </a>

        <h1 class="auth-title h2" style="font-size: 2rem; margin-bottom: 0.5rem;">Create Account</h1>
        <div class="auth-subtitle">Join our community and start your creative journey</div>

        <button class="social-login-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Sign up with Google
        </button>

        <button class="social-login-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.43.987 3.96.948 1.637-.026 2.62-1.482 3.6-2.94 1.13-1.65 1.59-3.26 1.614-3.344-.037-.013-3.138-1.2-3.161-4.787-.02-3.003 2.454-4.444 2.56-4.502-1.41-2.073-3.59-2.364-4.364-2.427-2.083-.17-4.116 1.054-5.116 1.054a3.81 3.81 0 0 1-2.42-.908zm1.884-3.662C15.022 2.04 15.65 0 15.65 0c-1.879.078-3.978 1.252-5.031 2.441-.937 1.054-1.678 2.56-1.463 4.027 2.08.156 3.948-1.054 4.88-2.234z" />
            </svg>
            Sign up with Apple
        </button>

        <div class="auth-divider">or create with email</div>

        <form action="#" method="POST" onsubmit="event.preventDefault()">
            <div class="form-group" style="text-align: left; margin-bottom: 1rem;">
                <label>Full Name</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="form-group" style="text-align: left; margin-bottom: 1rem;">
                <label>Email address</label>
                <input type="email" class="form-control" required>
            </div>
            <div class="form-group" style="text-align: left; margin-bottom: 1rem;">
                <label>Password</label>
                <div class="password-group">
                    <input type="password" class="form-control" required style="padding-right: 40px;">
                    <button type="button" class="pwd-toggle" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-eye">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                <label>Confirm Password</label>
                <div class="password-group">
                    <input type="password" class="form-control" required style="padding-right: 40px;">
                    <button type="button" class="pwd-toggle" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-eye">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-bottom: 1rem;">Register Account</button>
        </form>

        <p class="auth-sub" style="margin-top: 0;">Already have an account? <a href="login.html"
                style="color:var(--color-primary); font-weight:500;">Sign in</a></p>
    </div>
    <!-- Move to Top Button -->
    <button class="move-to-top" id="moveToTop" aria-label="Move to top">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="m18 15-6-6-6 6" />
        </svg>
    </button>
</body>

</html>
